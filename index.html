<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPACE INVADERS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Canvas setup ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const W = 448, H = 512;
canvas.width  = W;
canvas.height = H;

// Scale to fit viewport
function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ─── Web Audio ─────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type = 'square', vol = 0.15) {
  const g = AC.createGain();
  const o = AC.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq * 0.5, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur);
}
function shootSound()   { beep(800, 0.1, 'square', 0.12); }
function invHitSound()  { beep(200, 0.18, 'sawtooth', 0.2); }
function playerHitSound(){ beep(80, 0.5, 'sawtooth', 0.3); }
function ufoSound()     { beep(400 + Math.random()*200, 0.05, 'square', 0.1); }

// ─── Invader sprites (7×7 pixel art, 3 rows × 2 frames) ───────────────────
//   Each sprite: array of 7 strings, each 7 chars ('1' = pixel)
const SPRITES = {
  // Row 0 – top row (alien A)
  A: [
    ['  111  ','  111  ',' 11111 ','1 111 1','1111111','1 1 1 1',' 1   1 '],
    ['  111  ','  111  ',' 11111 ','1 111 1','1111111',' 1 1 1 ','1     1'],
  ],
  // Row 1 – middle (alien B)
  B: [
    [' 1   1 ','  1 1  ',' 11111 ','11 1 11','1111111','1111111','1     1'],
    [' 1   1 ','1  1  1','111111 ','11 1 11','1111111',' 1   1 ','1 1 1 1'],
  ],
  // Row 2 – bottom (alien C)
  C: [
    ['   1   ','  111  ',' 11111 ','11 1 11','1111111','1 111 1','  1 1  '],
    ['   1   ','  111  ',' 11111 ','11 1 11','1111111','  1 1  ','1 1 1 1'],
  ],
};

const COLORS = { A: '#f55', B: '#ff0', C: '#0f0' };
const SP = 13; // sprite display size (pixels)

// ─── Game state ────────────────────────────────────────────────────────────
let score, hiScore = 0, lives, level;
let invaders, bullets, playerBullet, shields;
let player, ufoBullets;
let ufo;
let invDir, invStep, invDropRemaining, invMoveTimer, invMoveInterval;
let invFrame, frameCount;
let gameState; // 'title' | 'playing' | 'dead' | 'gameover' | 'win'
let deathTimer;
let marchFreqs, marchIdx;

// ─── Shield pixel map (22×16) ──────────────────────────────────────────────
const SHIELD_SHAPE = [
  '0000011111111111100000',
  '0001111111111111111000',
  '0011111111111111111100',
  '0111111111111111111110',
  '1111111111111111111111',
  '1111111111111111111111',
  '1111111111111111111111',
  '1111111111111111111111',
  '1111111111111111111111',
  '1111111111111111111111',
  '1111111111111111111111',
  '1111110000000011111111',
  '1111100000000001111111',
  '1111000000000000111111',
  '1110000000000000011111',
  '1100000000000000001111',
];

function makeShield(x, y) {
  const pixels = [];
  for (let r = 0; r < SHIELD_SHAPE.length; r++) {
    for (let c = 0; c < SHIELD_SHAPE[r].length; c++) {
      if (SHIELD_SHAPE[r][c] === '1') pixels.push({x: x + c*2, y: y + r*2});
    }
  }
  return pixels;
}

// ─── Init / reset ──────────────────────────────────────────────────────────
function init(lvl = 1) {
  level = lvl;
  score = lvl === 1 ? 0 : score;
  lives = 3;
  frameCount = 0;
  invFrame = 0;
  bullets = [];
  ufoBullets = [];
  playerBullet = null;
  ufo = null;

  player = { x: W / 2 - 8, y: H - 40, w: 26, h: 12, alive: true };

  // 5 columns × 11 rows isn't classic; classic is 11 cols × 5 rows
  const cols = 11, rows = 5;
  const startX = 24, startY = 80;
  const xGap = 36, yGap = 28;
  invaders = [];
  for (let r = 0; r < rows; r++) {
    const type = r === 0 ? 'C' : r <= 2 ? 'B' : 'A';
    for (let c = 0; c < cols; c++) {
      invaders.push({
        x: startX + c * xGap,
        y: startY + r * yGap,
        type,
        alive: true,
        frame: 0,
      });
    }
  }

  invDir = 1;
  invStep = 2 + level;
  invDropRemaining = 0;
  invMoveTimer = 0;
  invMoveInterval = 50; // frames between moves; shrinks as invaders die

  marchFreqs = [160, 130, 100, 80];
  marchIdx = 0;

  shields = [];
  const shieldXs = [44, 142, 242, 340];
  shieldXs.forEach(sx => shields.push(...makeShield(sx, H - 110)));

  gameState = 'playing';
  deathTimer = 0;
}

// ─── Input ─────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (gameState === 'title' && e.code === 'Space') {
    AC.resume();
    init(1);
  }
  if ((gameState === 'gameover' || gameState === 'win') && e.code === 'Space') {
    AC.resume();
    init(1);
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile touch
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  AC.resume();
  if (gameState === 'title' || gameState === 'gameover' || gameState === 'win') {
    init(1); return;
  }
  if (gameState === 'playing' && player.alive) fireBullet();
}, {passive: false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStartX) return;
  const dx = e.touches[0].clientX - touchStartX;
  const scale = W / canvas.getBoundingClientRect().width;
  player.x += dx * scale;
  player.x = Math.max(0, Math.min(W - player.w, player.x));
  touchStartX = e.touches[0].clientX;
}, {passive: false});

// ─── Helpers ───────────────────────────────────────────────────────────────
function aliveInvaders() { return invaders.filter(i => i.alive); }

function fireBullet() {
  if (playerBullet) return;
  playerBullet = { x: player.x + player.w / 2, y: player.y - 4, w: 2, h: 10 };
  shootSound();
}

function invaderFire() {
  const alive = aliveInvaders();
  if (!alive.length) return;
  // Pick a random invader from the bottom of each column
  const cols = {};
  alive.forEach(inv => {
    const col = Math.round(inv.x / 36);
    if (!cols[col] || inv.y > cols[col].y) cols[col] = inv;
  });
  const shooters = Object.values(cols);
  const shooter = shooters[Math.floor(Math.random() * shooters.length)];
  bullets.push({ x: shooter.x + SP / 2, y: shooter.y + SP + 2, w: 2, h: 10, phase: 0 });
}

function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ─── Update ────────────────────────────────────────────────────────────────
let lastShot = 0;
let ufoTimer = 0;
let invFireTimer = 0;

function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  if (!player.alive) {
    deathTimer--;
    if (deathTimer <= 0) {
      if (lives <= 0) { gameState = 'gameover'; return; }
      player.alive = true;
      playerBullet = null;
      bullets = [];
    }
    return;
  }

  // ── Player movement ──
  const speed = 3;
  if (keys['ArrowLeft']  || keys['KeyA']) player.x -= speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += speed;
  player.x = Math.max(0, Math.min(W - player.w, player.x));

  // ── Shoot ──
  if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && frameCount - lastShot > 8) {
    fireBullet();
    lastShot = frameCount;
  }

  // ── Player bullet ──
  if (playerBullet) {
    playerBullet.y -= 8;
    if (playerBullet.y < 0) { playerBullet = null; }
  }

  // ── Invader march ──
  invMoveTimer++;
  const alive = aliveInvaders();
  const dynInterval = Math.max(4, Math.floor(invMoveInterval * alive.length / 55));

  if (invMoveTimer >= dynInterval) {
    invMoveTimer = 0;
    invFrame = 1 - invFrame;
    alive.forEach(i => i.frame = invFrame);

    // March sound
    beep(marchFreqs[marchIdx % 4], 0.06, 'square', 0.1);
    marchIdx++;

    if (invDropRemaining > 0) {
      // Dropping
      alive.forEach(i => i.y += 4);
      invDropRemaining -= 4;
    } else {
      // Horizontal
      let hitEdge = false;
      alive.forEach(i => {
        i.x += invDir * invStep;
        if (i.x <= 4 || i.x >= W - SP - 4) hitEdge = true;
      });
      if (hitEdge) {
        invDir *= -1;
        invDropRemaining = 16;
      }
    }

    // Check if invaders reached the player row
    if (alive.some(i => i.y + SP >= player.y)) {
      gameState = 'gameover';
      return;
    }
  }

  // ── Invader fire ──
  invFireTimer++;
  const fireInterval = Math.max(20, 60 - level * 5);
  if (invFireTimer >= fireInterval) {
    invFireTimer = 0;
    invaderFire();
  }

  // ── Enemy bullets ──
  bullets.forEach(b => {
    b.y += 4;
    b.phase++;
    // Zigzag
    b.x += Math.sin(b.phase * 0.4) * 1.5;
  });
  bullets = bullets.filter(b => b.y < H);

  // ── UFO ──
  ufoTimer++;
  if (!ufo && ufoTimer > 600 + Math.random() * 600) {
    ufoTimer = 0;
    ufo = { x: ufoDir() === 1 ? -40 : W + 40, y: 36, dir: ufoDir(), alive: true, flashTimer: 0 };
  }
  function ufoDir() { return Math.random() < 0.5 ? 1 : -1; }
  if (ufo) {
    ufo.x += ufo.dir * 2;
    if (ufoTimer % 3 === 0) ufoSound();
    if (ufo.x < -60 || ufo.x > W + 60) ufo = null;
    if (ufo && ufo.flashTimer > 0) {
      ufo.flashTimer--;
      if (ufo.flashTimer <= 0) ufo = null;
    }
  }

  // ── Collisions: player bullet → invaders ──
  if (playerBullet) {
    for (let i = 0; i < invaders.length; i++) {
      const inv = invaders[i];
      if (!inv.alive) continue;
      if (rectHit(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h,
                  inv.x, inv.y, SP, SP)) {
        inv.alive = false;
        playerBullet = null;
        const pts = inv.type === 'C' ? 30 : inv.type === 'B' ? 20 : 10;
        score += pts;
        invHitSound();
        break;
      }
    }
  }

  // ── Collisions: player bullet → UFO ──
  if (playerBullet && ufo && !ufo.flashTimer) {
    if (rectHit(playerBullet.x, playerBullet.y, playerBullet.w, playerBullet.h,
                ufo.x, ufo.y, 36, 12)) {
      const bonus = (Math.floor(Math.random() * 6) + 1) * 50;
      score += bonus;
      ufo.score = bonus;
      ufo.flashTimer = 60;
      playerBullet = null;
      beep(1200, 0.3, 'sawtooth', 0.2);
    }
  }

  // ── Collisions: player bullet → shields ──
  if (playerBullet) {
    for (let i = shields.length - 1; i >= 0; i--) {
      const p = shields[i];
      if (rectHit(playerBullet.x, playerBullet.y, 2, 10, p.x, p.y, 2, 2)) {
        shields.splice(i, 1);
        playerBullet = null;
        break;
      }
    }
  }

  // ── Collisions: enemy bullets → shields ──
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    let hit = false;
    for (let si = shields.length - 1; si >= 0; si--) {
      const p = shields[si];
      if (rectHit(b.x, b.y, b.w, b.h, p.x, p.y, 2, 2)) {
        // Destroy a cluster of shield pixels
        const cx = p.x, cy = p.y;
        for (let k = shields.length - 1; k >= 0; k--) {
          const d = Math.hypot(shields[k].x - cx, shields[k].y - cy);
          if (d < 6) shields.splice(k, 1);
        }
        hit = true;
        break;
      }
    }
    if (hit) { bullets.splice(bi, 1); continue; }
  }

  // ── Collisions: enemy bullets → player ──
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (rectHit(b.x, b.y, b.w, b.h, player.x, player.y, player.w, player.h)) {
      bullets.splice(bi, 1);
      lives--;
      player.alive = false;
      deathTimer = 90;
      playerBullet = null;
      playerHitSound();
      break;
    }
  }

  // ── Win condition ──
  if (aliveInvaders().length === 0) {
    gameState = 'win';
    if (score > hiScore) hiScore = score;
  }
}

// ─── Draw helpers ──────────────────────────────────────────────────────────
function drawSprite(sprite, frame, x, y, color) {
  const rows = sprite[frame];
  const px = 2;
  ctx.fillStyle = color;
  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r].length; c++) {
      if (rows[r][c] === '1') {
        ctx.fillRect(Math.round(x + c * px), Math.round(y + r * px), px, px);
      }
    }
  }
}

function drawPlayer(x, y) {
  ctx.fillStyle = '#0f0';
  // Base
  ctx.fillRect(x, y + 8, 26, 4);
  // Body
  ctx.fillRect(x + 4, y + 4, 18, 4);
  // Cabin
  ctx.fillRect(x + 10, y, 6, 4);
  // Cannon
  ctx.fillRect(x + 12, y - 4, 2, 4);
}

function drawBullet(b) {
  ctx.fillStyle = '#fff';
  ctx.fillRect(b.x, b.y, b.w, b.h);
}

function drawEnemyBullet(b) {
  // Zigzag / lightning bolt
  ctx.strokeStyle = '#f80';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const segs = 4;
  const segH = b.h / segs;
  for (let i = 0; i <= segs; i++) {
    const bx = b.x + (i % 2 === 0 ? 0 : 3);
    const by = b.y + i * segH;
    i === 0 ? ctx.moveTo(bx, by) : ctx.lineTo(bx, by);
  }
  ctx.stroke();
}

function drawUFO(u) {
  if (u.flashTimer > 0) {
    if (u.flashTimer % 8 < 4) {
      ctx.fillStyle = '#ff0';
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(u.score, u.x + 18, u.y + 8);
    }
    return;
  }
  ctx.fillStyle = '#f0f';
  // Saucer body
  ctx.beginPath();
  ctx.ellipse(u.x + 18, u.y + 8, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Dome
  ctx.beginPath();
  ctx.ellipse(u.x + 18, u.y + 4, 9, 5, 0, Math.PI, 0);
  ctx.fill();
  // Windows
  ctx.fillStyle = '#f8f';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(u.x + 10 + i * 8, u.y + 8, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawShields() {
  ctx.fillStyle = '#0f0';
  shields.forEach(p => ctx.fillRect(p.x, p.y, 2, 2));
}

function drawExplosion(x, y) {
  ctx.fillStyle = '#f80';
  ctx.font = 'bold 20px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('*', x, y);
}

function drawHUD() {
  ctx.fillStyle = '#0f0';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + String(score).padStart(5, '0'), 10, 22);
  ctx.textAlign = 'center';
  ctx.fillText('HI-SCORE: ' + String(hiScore).padStart(5, '0'), W / 2, 22);
  ctx.textAlign = 'right';
  ctx.fillText('LIVES: ' + '▶'.repeat(Math.max(0, lives)), W - 10, 22);

  // Level indicator
  ctx.textAlign = 'right';
  ctx.fillStyle = '#0af';
  ctx.fillText('LEVEL ' + level, W - 10, 40);

  // Bottom line
  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H - 22);
  ctx.lineTo(W, H - 22);
  ctx.stroke();
}

function drawTitle() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Starfield
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 137 + 31) % W);
    const sy = ((i * 97  + 17) % H);
    ctx.fillRect(sx, sy, 1, 1);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 36px Courier New';
  ctx.fillText('SPACE', W/2, 110);
  ctx.fillText('INVADERS', W/2, 150);

  // Sample invaders
  const demo = [
    {type:'C', x: W/2 - 100, y: 190},
    {type:'B', x: W/2 - 40,  y: 190},
    {type:'A', x: W/2 + 20,  y: 190},
  ];
  demo.forEach(d => drawSprite(SPRITES[d.type], (frameCount >> 3) & 1, d.x, d.y, COLORS[d.type]));

  ctx.fillStyle = '#0f0';
  ctx.font = '12px Courier New';
  ctx.fillText('= 10 PTS', W/2 - 60, 225);

  const demo2 = [
    {type:'B', x: W/2 - 100, y: 240},
    {type:'A', x: W/2 - 40,  y: 240},
  ];
  demo2.forEach(d => drawSprite(SPRITES[d.type], (frameCount >> 3) & 1, d.x, d.y, COLORS[d.type]));
  ctx.fillText('= 20 PTS', W/2 - 60, 276);

  const demo3 = [{type:'C', x: W/2 - 100, y: 290}];
  demo3.forEach(d => drawSprite(SPRITES[d.type], (frameCount >> 3) & 1, d.x, d.y, COLORS[d.type]));
  ctx.fillText('= 30 PTS', W/2 - 60, 326);

  ctx.fillStyle = '#f0f';
  ctx.font = '12px Courier New';
  ctx.fillText('UFO = ???  PTS', W/2, 360);

  ctx.fillStyle = '#ff0';
  ctx.font = (frameCount % 60 < 40) ? '16px Courier New' : '14px Courier New';
  ctx.fillText('PRESS SPACE TO START', W/2, 420);

  ctx.fillStyle = '#888';
  ctx.font = '11px Courier New';
  ctx.fillText('← → MOVE   SPACE FIRE', W/2, 455);
  ctx.fillText('(TOUCH: SWIPE + TAP)', W/2, 472);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f00';
  ctx.font = 'bold 40px Courier New';
  ctx.fillText('GAME OVER', W/2, H/2 - 20);
  ctx.fillStyle = '#ff0';
  ctx.font = '16px Courier New';
  ctx.fillText('SCORE: ' + score, W/2, H/2 + 20);
  if (score >= hiScore) ctx.fillText('NEW HI-SCORE!', W/2, H/2 + 42);
  ctx.fillStyle = '#fff';
  ctx.font = (frameCount % 60 < 40) ? '16px Courier New' : '14px Courier New';
  ctx.fillText('PRESS SPACE TO RETRY', W/2, H/2 + 80);
}

function drawWin() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0ff';
  ctx.font = 'bold 32px Courier New';
  ctx.fillText('STAGE CLEAR!', W/2, H/2 - 20);
  ctx.fillStyle = '#ff0';
  ctx.font = '16px Courier New';
  ctx.fillText('SCORE: ' + score, W/2, H/2 + 20);
  ctx.fillStyle = '#fff';
  ctx.font = (frameCount % 60 < 40) ? '16px Courier New' : '14px Courier New';
  ctx.fillText('PRESS SPACE FOR NEXT LEVEL', W/2, H/2 + 80);
}

// ─── Main draw ─────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'title') { drawTitle(); return; }

  // Starfield
  ctx.fillStyle = '#111';
  for (let i = 0; i < 60; i++) {
    ctx.fillRect(((i * 173 + 5) % W), ((i * 113 + 7) % H), 1, 1);
  }

  drawHUD();
  drawShields();

  // Invaders
  invaders.forEach(inv => {
    if (!inv.alive) return;
    drawSprite(SPRITES[inv.type], inv.frame, inv.x, inv.y, COLORS[inv.type]);
  });

  // UFO
  if (ufo) drawUFO(ufo);

  // Player
  if (player.alive) {
    if (deathTimer <= 0) drawPlayer(player.x, player.y);
  } else {
    // Death flash
    if (deathTimer % 10 < 5) drawExplosion(player.x + player.w / 2, player.y + player.h / 2);
  }

  // Bullets
  if (playerBullet) drawBullet(playerBullet);
  bullets.forEach(drawEnemyBullet);

  if (gameState === 'gameover') drawGameOver();
  if (gameState === 'win')      drawWin();
}

// ─── Game loop ─────────────────────────────────────────────────────────────
function loop() {
  frameCount++;
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── Win → next level ──────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && gameState === 'win') {
    AC.resume();
    init(level + 1);
  }
});

// ─── Start ─────────────────────────────────────────────────────────────────
gameState = 'title';
frameCount = 0;
score = 0;
loop();
</script>
</body>
</html>
