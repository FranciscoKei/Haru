<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
      color: #0ff; text-shadow: 0 0 8px #0ff;
    }
    #top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px; background: rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(0,255,255,0.2);
    }
    #top-bar span { font-size: 18px; letter-spacing: 2px; }
    .lives-icon { display: inline-block; color: #f55; text-shadow: 0 0 6px #f55; font-size: 20px; margin-left: 4px; }

    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,10,0.85); color: #0ff; text-align: center;
      z-index: 10;
    }
    #overlay h1 {
      font-size: clamp(32px, 6vw, 72px); letter-spacing: 6px;
      text-shadow: 0 0 20px #0ff, 0 0 40px #00f;
      margin-bottom: 16px;
    }
    #overlay .subtitle { font-size: 18px; color: #8ef; margin-bottom: 40px; letter-spacing: 2px; }
    #overlay .controls-info {
      font-size: 14px; color: #6af; margin-bottom: 40px; line-height: 2;
    }
    #start-btn {
      padding: 14px 48px; font-size: 22px; font-family: inherit;
      background: transparent; border: 2px solid #0ff; color: #0ff;
      letter-spacing: 4px; cursor: pointer; pointer-events: all;
      text-shadow: 0 0 8px #0ff; box-shadow: 0 0 16px rgba(0,255,255,0.3);
      transition: all 0.2s;
    }
    #start-btn:hover {
      background: rgba(0,255,255,0.15);
      box-shadow: 0 0 32px rgba(0,255,255,0.6);
    }

    #wave-announce {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 48px; color: #ff0; text-shadow: 0 0 20px #ff0;
      letter-spacing: 4px; pointer-events: none; opacity: 0;
      transition: opacity 0.4s; z-index: 5;
    }

    #mobile-controls {
      position: fixed; bottom: 20px; left: 0; width: 100%;
      display: none; justify-content: space-between; align-items: flex-end;
      padding: 0 24px; pointer-events: none; z-index: 6;
    }
    .btn-group { display: flex; gap: 12px; pointer-events: all; }
    .ctrl-btn {
      width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid rgba(0,255,255,0.6); background: rgba(0,255,255,0.1);
      color: #0ff; font-size: 24px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { background: rgba(0,255,255,0.3); }
    #fire-btn {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid rgba(255,80,80,0.8); background: rgba(255,80,80,0.15);
      color: #f55; font-size: 28px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; user-select: none;
      text-shadow: 0 0 8px #f55; pointer-events: all;
      -webkit-tap-highlight-color: transparent;
    }
    #fire-btn:active { background: rgba(255,80,80,0.4); }

    @media (max-width: 700px) {
      #mobile-controls { display: flex; }
      #top-bar span { font-size: 14px; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="top-bar">
    <span>SCORE: <span id="score-val">0</span></span>
    <span id="title-hud">3D SPACE INVADERS</span>
    <span>LIVES: <span id="lives-val"></span></span>
  </div>
</div>

<!-- Wave announce -->
<div id="wave-announce" id="wave-announce"></div>

<!-- Start / Game Over overlay -->
<div id="overlay">
  <h1>3D SPACE INVADERS</h1>
  <div class="subtitle">三次元インベーダー</div>
  <div class="controls-info">
    ← → &nbsp; 移動 &nbsp;|&nbsp; SPACE / Z &nbsp; 発射<br>
    WASD / 矢印キー でも操作可能
  </div>
  <button id="start-btn">START GAME</button>
</div>

<!-- Mobile controls -->
<div id="mobile-controls">
  <div class="btn-group">
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
  <div id="fire-btn">🔫</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ─── Audio ────────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, dur, type='square', vol=0.15) {
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e){}
}
function shootSound() { beep(880, 0.08, 'sawtooth', 0.1); }
function enemyShootSound() { beep(220, 0.12, 'square', 0.07); }
function explodeSound(big=false) {
  beep(big ? 80 : 160, big ? 0.5 : 0.25, 'sawtooth', big ? 0.2 : 0.12);
}
function levelUpSound() {
  [523,659,784,1047].forEach((f,i) => setTimeout(()=>beep(f,0.15,'sine',0.15), i*120));
}

// ─── Scene setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);
scene.fog = new THREE.FogExp2(0x000010, 0.012);

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 8, 22);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});

// ─── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x111133, 2));
const dirLight = new THREE.DirectionalLight(0x4488ff, 3);
dirLight.position.set(5, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x00ffff, 2, 40);
pointLight.position.set(0, 10, 5);
scene.add(pointLight);

// ─── Starfield ────────────────────────────────────────────────────────────────
(function buildStars() {
  const geo = new THREE.BufferGeometry();
  const N = 2000;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random()-0.5)*300;
    pos[i*3+1] = (Math.random()-0.5)*200;
    pos[i*3+2] = (Math.random()-0.5)*300;
    const c = Math.random();
    col[i*3] = c; col[i*3+1] = c; col[i*3+2] = 1;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.4, vertexColors: true })));
})();

// ─── Grid floor ───────────────────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(80, 40, 0x001133, 0x001133);
gridHelper.position.y = -4;
scene.add(gridHelper);

// ─── Materials ────────────────────────────────────────────────────────────────
const playerMat  = new THREE.MeshStandardMaterial({ color: 0x00eeff, emissive: 0x004466, metalness:0.8, roughness:0.2 });
const bulletMat  = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffaa00, roughness:0.1 });
const eBulletMat = new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff0000, roughness:0.1 });
const shieldMat  = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00aa44, transparent: true, opacity: 0.5 });

const enemyColors = [
  new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0x880022, metalness:0.5, roughness:0.3 }),
  new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x882200, metalness:0.5, roughness:0.3 }),
  new THREE.MeshStandardMaterial({ color: 0xcc00ff, emissive: 0x660088, metalness:0.5, roughness:0.3 }),
];

// ─── Geometries ───────────────────────────────────────────────────────────────
function makePlayerMesh() {
  const group = new THREE.Group();
  // body
  const body = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.6, 8), playerMat.clone());
  body.rotation.x = Math.PI;
  group.add(body);
  // wings
  const wingGeo = new THREE.BoxGeometry(2.8, 0.15, 0.8);
  const wing = new THREE.Mesh(wingGeo, playerMat.clone());
  wing.position.y = 0.1;
  group.add(wing);
  // engine glow
  const glow = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 8),
    new THREE.MeshStandardMaterial({ color:0x0088ff, emissive:0x00ffff, emissiveIntensity:2 }));
  glow.position.y = 0.7;
  group.add(glow);
  group.castShadow = true;
  return group;
}

function makeEnemyMesh(row) {
  const group = new THREE.Group();
  const mat = enemyColors[row % enemyColors.length].clone();
  // body
  const body = new THREE.Mesh(new THREE.IcosahedronGeometry(0.55, 0), mat);
  body.castShadow = true;
  group.add(body);
  // eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffff00, emissiveIntensity:2 });
  for (let s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), eyeMat);
    eye.position.set(s * 0.22, 0.15, 0.42);
    group.add(eye);
  }
  // antenna
  const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6),
    new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0x88ffff }));
  ant.position.y = 0.75;
  group.add(ant);
  const tip = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6),
    new THREE.MeshStandardMaterial({ color:0xff4444, emissive:0xff0000, emissiveIntensity:3 }));
  tip.position.y = 1.02;
  group.add(tip);
  return group;
}

// ─── Game State ───────────────────────────────────────────────────────────────
const COLS = 8, ROWS = 3;
const PLAY_W = 18, PLAY_Z = 0;
const ENEMY_SPACING_X = 2.6, ENEMY_SPACING_Y = 2.2;
const BULLET_SPEED = 0.38, EBULLET_SPEED = 0.22;
const PLAYER_SPEED = 0.15;
const SHOOT_COOLDOWN = 300; // ms

let state = 'title'; // title | playing | dead | gameover | win
let score = 0, lives = 3, wave = 1;
let playerX = 0;
let enemies = [];
let bullets = [];
let eBullets = [];
let particles = [];
let shields = [];
let lastShot = 0;
let enemyDir = 1, enemySpeed = 0.018, enemyDropZ = 0;
let enemyMoveTimer = 0;
let enemyShootTimer = 0;
let playerMesh, playerLight;
let waveAnnounceTimer = 0;

const keys = {};
const mobileInput = { left: false, right: false, fire: false };

// ─── Player ───────────────────────────────────────────────────────────────────
function createPlayer() {
  if (playerMesh) scene.remove(playerMesh);
  playerMesh = makePlayerMesh();
  playerMesh.position.set(0, -1.5, PLAY_Z + 8);
  scene.add(playerMesh);
  playerLight = new THREE.PointLight(0x00ffff, 1.5, 8);
  playerMesh.add(playerLight);
}

// ─── Shields ──────────────────────────────────────────────────────────────────
function createShields() {
  shields.forEach(s => scene.remove(s.mesh));
  shields = [];
  const positions = [-7, -2.5, 2.5, 7];
  for (const px of positions) {
    const geo = new THREE.BoxGeometry(2.2, 0.6, 0.3);
    const mesh = new THREE.Mesh(geo, shieldMat.clone());
    mesh.position.set(px, -1.5, PLAY_Z + 5.5);
    scene.add(mesh);
    shields.push({ mesh, hp: 3 });
  }
}

// ─── Enemies ──────────────────────────────────────────────────────────────────
function createEnemies() {
  enemies.forEach(e => scene.remove(e.mesh));
  enemies = [];
  const startX = -((COLS - 1) * ENEMY_SPACING_X) / 2;
  const startY = 2;
  const baseZ = PLAY_Z - 8;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const mesh = makeEnemyMesh(r);
      mesh.position.set(startX + c * ENEMY_SPACING_X, startY - r * ENEMY_SPACING_Y * 0.5, baseZ - r * 1.2);
      scene.add(mesh);
      enemies.push({
        mesh,
        col: c, row: r,
        hp: r === 0 ? 2 : 1,
        points: (ROWS - r) * 10 * wave,
        alive: true,
        bobPhase: Math.random() * Math.PI * 2,
      });
    }
  }
}

// ─── Bullets ──────────────────────────────────────────────────────────────────
function spawnBullet(x, y, z) {
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.6, 6), bulletMat.clone());
  mesh.position.set(x, y, z);
  const light = new THREE.PointLight(0xffff00, 2, 4);
  mesh.add(light);
  scene.add(mesh);
  bullets.push({ mesh });
  shootSound();
}

function spawnEBullet(x, y, z) {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.18, 6, 6), eBulletMat.clone());
  mesh.position.set(x, y, z);
  const light = new THREE.PointLight(0xff2200, 1.5, 5);
  mesh.add(light);
  scene.add(mesh);
  eBullets.push({ mesh });
  enemyShootSound();
}

// ─── Particles ────────────────────────────────────────────────────────────────
function spawnExplosion(pos, color, big = false) {
  const count = big ? 24 : 12;
  for (let i = 0; i < count; i++) {
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(big ? 0.25 : 0.15, 4, 4),
      new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 2, transparent: true })
    );
    mesh.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * (big ? 0.3 : 0.2),
      (Math.random() - 0.5) * (big ? 0.3 : 0.2),
      (Math.random() - 0.5) * (big ? 0.3 : 0.2)
    );
    scene.add(mesh);
    particles.push({ mesh, vel, life: 1.0, decay: big ? 0.025 : 0.04 });
  }
  explodeSound(big);
}

// ─── Collision helpers ────────────────────────────────────────────────────────
function dist2D(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.z - b.z) ** 2);
}

// ─── Init game ────────────────────────────────────────────────────────────────
function initGame() {
  // clear old
  [...bullets, ...eBullets].forEach(b => scene.remove(b.mesh));
  particles.forEach(p => scene.remove(p.mesh));
  bullets = []; eBullets = []; particles = [];
  score = 0; lives = 3; wave = 1;
  playerX = 0;
  enemyDir = 1; enemySpeed = 0.018 + (wave - 1) * 0.003;
  enemyDropZ = 0;
  createPlayer();
  createShields();
  createEnemies();
  updateHUD();
  state = 'playing';
  showWaveAnnounce(wave);
}

function nextWave() {
  wave++;
  [...bullets, ...eBullets].forEach(b => scene.remove(b.mesh));
  bullets = []; eBullets = [];
  enemyDir = 1;
  enemySpeed = 0.018 + (wave - 1) * 0.003;
  enemyDropZ = 0;
  createShields();
  createEnemies();
  updateHUD();
  state = 'playing';
  showWaveAnnounce(wave);
  levelUpSound();
}

function showWaveAnnounce(w) {
  const el = document.getElementById('wave-announce');
  el.textContent = `WAVE ${w}`;
  el.style.opacity = '1';
  waveAnnounceTimer = 2.0;
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  const livesEl = document.getElementById('lives-val');
  livesEl.innerHTML = Array(lives).fill('<span class="lives-icon">♥</span>').join('');
}

// ─── Overlay ──────────────────────────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const overlayTitle = overlay.querySelector('h1');
const overlaySub = overlay.querySelector('.subtitle');

startBtn.addEventListener('click', () => {
  audioCtx.resume();
  if (state === 'playing') return;
  overlay.style.display = 'none';
  initGame();
});

function showOverlay(title, sub, btnText) {
  overlayTitle.textContent = title;
  overlaySub.textContent = sub;
  startBtn.textContent = btnText;
  overlay.style.display = 'flex';
}

// ─── Input ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'playing' && (e.code === 'Space' || e.code === 'KeyZ')) {
    tryShoot();
    e.preventDefault();
  }
  if (e.code === 'Space' && (state === 'dead' || state === 'gameover' || state === 'title')) {
    startBtn.click();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile buttons
document.getElementById('btn-left').addEventListener('touchstart', e => { mobileInput.left = true; e.preventDefault(); }, {passive:false});
document.getElementById('btn-left').addEventListener('touchend', e => { mobileInput.left = false; e.preventDefault(); }, {passive:false});
document.getElementById('btn-right').addEventListener('touchstart', e => { mobileInput.right = true; e.preventDefault(); }, {passive:false});
document.getElementById('btn-right').addEventListener('touchend', e => { mobileInput.right = false; e.preventDefault(); }, {passive:false});
document.getElementById('fire-btn').addEventListener('touchstart', e => { tryShoot(); e.preventDefault(); }, {passive:false});

// Also mouse click for fire
document.getElementById('fire-btn').addEventListener('click', () => tryShoot());

function tryShoot() {
  if (state !== 'playing') return;
  const now = Date.now();
  if (now - lastShot < SHOOT_COOLDOWN) return;
  lastShot = now;
  const p = playerMesh.position;
  spawnBullet(p.x, p.y, p.z - 0.5);
}

// ─── Game loop ────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let frameCount = 0;

function update(dt) {
  if (state !== 'playing') return;

  frameCount++;

  // Wave announce fade
  if (waveAnnounceTimer > 0) {
    waveAnnounceTimer -= dt;
    if (waveAnnounceTimer <= 0) {
      document.getElementById('wave-announce').style.opacity = '0';
    }
  }

  // ── Player movement ──
  const moveLeft  = keys['ArrowLeft']  || keys['KeyA'] || mobileInput.left;
  const moveRight = keys['ArrowRight'] || keys['KeyD'] || mobileInput.right;
  if (moveLeft)  playerX = Math.max(-PLAY_W / 2, playerX - PLAYER_SPEED * (dt / 0.016));
  if (moveRight) playerX = Math.min(PLAY_W / 2,  playerX + PLAYER_SPEED * (dt / 0.016));
  playerMesh.position.x = playerX;
  // tilt
  playerMesh.rotation.z = moveLeft ? 0.2 : moveRight ? -0.2 : 0;
  // engine bob
  playerMesh.position.y = -1.5 + Math.sin(frameCount * 0.05) * 0.08;

  // ── Bullets ──
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.mesh.position.z -= BULLET_SPEED * (dt / 0.016);
    if (b.mesh.position.z < -30) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      continue;
    }
    // vs enemies
    let hit = false;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (dist2D(b.mesh.position, e.mesh.position) < 1.1 &&
          Math.abs(b.mesh.position.z - e.mesh.position.z) < 1.1) {
        e.hp--;
        scene.remove(b.mesh);
        bullets.splice(i, 1);
        hit = true;
        spawnExplosion(e.mesh.position, 0xff4400);
        if (e.hp <= 0) {
          e.alive = false;
          scene.remove(e.mesh);
          score += e.points;
          spawnExplosion(e.mesh.position, 0xff8800, true);
          updateHUD();
        }
        break;
      }
    }
    if (hit) continue;
    // vs shields
    for (const s of shields) {
      if (!s.mesh.visible) continue;
      if (dist2D(b.mesh.position, s.mesh.position) < 1.4 &&
          Math.abs(b.mesh.position.z - s.mesh.position.z) < 0.5) {
        s.hp--;
        scene.remove(b.mesh);
        bullets.splice(i, 1);
        spawnExplosion(b.mesh.position, 0x00ff88);
        if (s.hp <= 0) s.mesh.visible = false;
        hit = true;
        break;
      }
    }
  }

  // ── Enemy bullets ──
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.mesh.position.z += EBULLET_SPEED * (dt / 0.016);
    if (b.mesh.position.z > 20) {
      scene.remove(b.mesh);
      eBullets.splice(i, 1);
      continue;
    }
    // vs player
    if (dist2D(b.mesh.position, playerMesh.position) < 1.0 &&
        Math.abs(b.mesh.position.z - playerMesh.position.z) < 0.8) {
      scene.remove(b.mesh);
      eBullets.splice(i, 1);
      hitPlayer();
      continue;
    }
    // vs shields
    let shieldHit = false;
    for (const s of shields) {
      if (!s.mesh.visible) continue;
      if (dist2D(b.mesh.position, s.mesh.position) < 1.4 &&
          Math.abs(b.mesh.position.z - s.mesh.position.z) < 0.5) {
        s.hp--;
        scene.remove(b.mesh);
        eBullets.splice(i, 1);
        spawnExplosion(b.mesh.position, 0x00ff88);
        if (s.hp <= 0) s.mesh.visible = false;
        shieldHit = true;
        break;
      }
    }
    if (shieldHit) continue;
  }

  // ── Enemy movement ──
  const aliveEnemies = enemies.filter(e => e.alive);
  if (aliveEnemies.length === 0) {
    nextWave();
    return;
  }

  enemyMoveTimer += dt;
  const moveInterval = Math.max(0.008, 0.022 - aliveEnemies.length * 0.0004) * Math.max(0.5, 1 - wave * 0.05);

  if (enemyMoveTimer >= moveInterval) {
    enemyMoveTimer = 0;
    let drop = false;
    const step = enemyDir * 0.22;
    for (const e of aliveEnemies) {
      e.mesh.position.x += step;
    }
    // check boundaries
    const xs = aliveEnemies.map(e => e.mesh.position.x);
    if (Math.max(...xs) > PLAY_W/2 - 1 || Math.min(...xs) < -PLAY_W/2 + 1) {
      enemyDir *= -1;
      drop = true;
    }
    if (drop) {
      enemyDropZ += 0.6;
      for (const e of aliveEnemies) {
        e.mesh.position.z += 0.6;
      }
    }
  }

  // Bob / rotate enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.bobPhase += dt * 1.5;
    e.mesh.position.y += Math.sin(e.bobPhase) * 0.005;
    e.mesh.rotation.y += dt * 0.8;
  }

  // Check if enemies reached player
  for (const e of aliveEnemies) {
    if (e.mesh.position.z > playerMesh.position.z - 1) {
      // game over
      spawnExplosion(playerMesh.position, 0x00ffff, true);
      state = 'gameover';
      setTimeout(() => showOverlay('GAME OVER', `SCORE: ${score}  WAVE: ${wave}`, 'PLAY AGAIN'), 1200);
      return;
    }
  }

  // ── Enemy shooting ──
  enemyShootTimer -= dt;
  if (enemyShootTimer <= 0) {
    const shootInterval = Math.max(0.4, 1.8 - wave * 0.12);
    enemyShootTimer = shootInterval * (0.5 + Math.random() * 0.5);
    // pick random alive enemy in bottom row of each column
    const byCol = {};
    for (const e of aliveEnemies) {
      if (!byCol[e.col] || e.row > byCol[e.col].row) byCol[e.col] = e;
    }
    const shooters = Object.values(byCol);
    const shooter = shooters[Math.floor(Math.random() * shooters.length)];
    if (shooter) {
      spawnEBullet(shooter.mesh.position.x, shooter.mesh.position.y - 0.5, shooter.mesh.position.z);
    }
  }

  // ── Particles ──
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.addScaledVector(p.vel, dt / 0.016);
    p.life -= p.decay * (dt / 0.016);
    p.mesh.material.opacity = Math.max(0, p.life);
    p.mesh.scale.setScalar(p.life);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // Camera slight follow
  camera.position.x += (playerX * 0.15 - camera.position.x) * 0.04;
}

function hitPlayer() {
  spawnExplosion(playerMesh.position, 0x00ffff, true);
  lives--;
  updateHUD();
  if (lives <= 0) {
    state = 'gameover';
    scene.remove(playerMesh);
    setTimeout(() => showOverlay('GAME OVER', `SCORE: ${score}  WAVE: ${wave}`, 'PLAY AGAIN'), 1200);
  } else {
    state = 'dead';
    scene.remove(playerMesh);
    setTimeout(() => {
      playerX = 0;
      createPlayer();
      state = 'playing';
    }, 1500);
  }
}

// ─── Render loop ──────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  // pulse point lights
  pointLight.intensity = 1.8 + Math.sin(Date.now() * 0.003) * 0.4;
  renderer.render(scene, camera);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
showOverlay('3D SPACE INVADERS', '三次元インベーダー', 'START GAME');
animate();
</script>
